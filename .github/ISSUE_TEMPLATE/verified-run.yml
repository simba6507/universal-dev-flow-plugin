name: Verified udflow run
description: Record a real or benchmarked udflow run with verifiable outcome data.
title: "[Verified run]: "
labels: ["evidence", "verified-run"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a udflow run.

        Please sanitize private code, secrets, customer data, and proprietary business rules before posting.

        This template is for evidence with a verifiable outcome. General feedback is welcome, but it should be labeled separately from measured evidence.

  - type: dropdown
    id: run_type
    attributes:
      label: Run type
      options:
        - Live task
        - Historical blind bug-catch
        - False positive report
        - Missed defect report
        - Other
    validations:
      required: true

  - type: dropdown
    id: final_verdict
    attributes:
      label: Final udflow verdict
      options:
        - READY
        - FIX REQUIRED
        - NOT READY
        - No formal verdict
    validations:
      required: true

  - type: checkboxes
    id: reviewers
    attributes:
      label: Reviewers involved
      options:
        - label: spec-reviewer
        - label: test-reviewer
        - label: code-reviewer
        - label: security-reviewer
        - label: architecture-reviewer
        - label: operability-reviewer
        - label: ui-ux-reviewer
        - label: gatekeeper

  - type: textarea
    id: run_details
    attributes:
      label: Run details
      description: |
        Paste the "Live run" block udflow prints at the end of a real run, or fill the skeleton below.
        Keep the Missed / False alarms / Outcome lines — honest negatives (misses, false positives) are the
        whole point, not just wins.
      value: |
        - Date: <YYYY-MM-DD>
        - Repository / stack: <public link, or a sanitized stack for private repos>
        - Language / framework: <e.g. TypeScript / React / Node>
        - Task: <what you asked udflow to do>
        - Intent given: <the requirement / contract handed in — how specific was it?>
        - Verification: <commands / browser checks / tests you actually ran>
        - Caught: <real findings udflow raised that you acted on>
        - Missed: <defects found later, after the verdict — or "none known">
        - False alarms: <findings that were NOT real defects — or "none">
        - Outcome after follow-up: <did the verdict hold? merged / reverted / fixed again?>
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence or links
      description: A verifiable artifact is what turns a claim into evidence — link a PR, commit, issue, sanitized log, or test output if you can.
      placeholder: "PR link, commit link, sanitized transcript, or test output."
    validations:
      required: false
