name: Validate

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  # Cancel superseded PR runs to save CI, but NEVER cancel a master-push run — its release job must
  # not be killed mid-publish (that would leave a tag with no release). The release job's own
  # concurrency group then serializes publishes.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]   # hooks have cross-platform path logic (incl. macOS/APFS case-folding)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      # Reliable, auth-free structural gate: manifests parse, required fields exist,
      # versions agree, references/agents/hooks linked from SKILL.md exist, every
      # agent/skill has frontmatter, and the shipped tree has no dev/runtime artifacts.
      - name: Validate plugin structure
        run: node .github/scripts/validate-structure.mjs

      # The session hooks run on every session and fail open, so a syntax error
      # would otherwise be invisible. Syntax-check and behaviorally test them.
      - name: Syntax-check hooks
        shell: bash
        run: |
          node --check udflow/hooks/plan-gate.js
          node --check udflow/hooks/load-failure-memory.js
          node --check udflow/hooks/orchestration-check.js
          node --check udflow/hooks/destructive-guard.js
          node --check udflow/hooks/compact-fidelity.js

      - name: Run hook tests
        shell: bash
        run: |
          test -f test/hooks.test.mjs   # guard: never let "0 tests found" pass as green
          node --test

      # Best-effort: the official validator. Linux-only and non-blocking because it
      # requires the Claude Code CLI, which may not run fully headless in CI.
      - name: claude plugin validate (best-effort)
        if: runner.os == 'Linux'
        continue-on-error: true
        shell: bash
        run: |
          npm install -g @anthropic-ai/claude-code || exit 0
          # Validate BOTH the marketplace (repo root) and the shipped plugin (./udflow).
          # The plugin manifest is in udflow/.claude-plugin/plugin.json, so validating
          # only the root would never check the plugin itself.
          claude plugin validate . || echo "marketplace validate could not run headless; the checks above are the gate."
          claude plugin validate ./udflow || echo "plugin validate could not run headless; the checks above are the gate."

  # Auto-publish the release once Validate passes: the plugin manifest version is the
  # source of truth — if no matching tag exists yet, cut the annotated tag + GitHub
  # release (notes from the CHANGELOG). This makes the version / manifests / CHANGELOG /
  # git tag / release impossible to drift; the maintainer never tags by hand. Idempotent
  # (skips if the release is already published — non-draft); push-to-master only.
  release:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # Serialize releases (do NOT cancel an in-progress publish); a queued run converges via the
    # published-release guard below rather than being killed mid-publish.
    concurrency:
      group: udflow-release
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the tag and create the release (overrides the read-only default)
    env:
      # Tag signing is OPT-IN + gated: with the UDFLOW_SIGN_PRIVATE_KEY secret set, release tags are GPG-signed
      # (GitHub "Verified"); without it the flow is unchanged (unsigned annotated tag). See SECURITY.md.
      HAS_GPG: ${{ secrets.UDFLOW_SIGN_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need existing tags to detect whether this version is already released
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Import GPG signing key (only when the UDFLOW_SIGN_PRIVATE_KEY secret is set)
        if: env.HAS_GPG == 'true'
        continue-on-error: true   # a key problem must NEVER break the release — the tag step falls back to unsigned
        env:
          UDFLOW_SIGN_PRIVATE_KEY: ${{ secrets.UDFLOW_SIGN_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$UDFLOW_SIGN_PRIVATE_KEY" | gpg --batch --import
          keyid=$(gpg --list-secret-keys --with-colons --keyid-format=long | awk -F: '/^sec:/{print $5; exit}')
          uid=$(gpg --list-keys --with-colons "$keyid" | awk -F: '/^uid:/{print $10; exit}')
          git config user.signingkey "$keyid"
          git config user.name "${uid% <*}"
          git config user.email "$(printf '%s' "$uid" | sed 's/.*<//; s/>.*//')"
          echo "Imported GPG signing key $keyid"
      - name: Tag + release when the manifest version is new
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ver=$(node -p "require('./udflow/.claude-plugin/plugin.json').version")
          tag="v$ver"
          # Capture the release's draft state once: "false"=published, "true"=draft, ""=no release.
          # ('|| true' keeps set -e happy when the release does not exist.)
          state="$(gh release view "$tag" --json isDraft -q '.isDraft' 2>/dev/null || true)"
          echo "Release state for $tag: isDraft=${state:-<none>}"
          if [ "$state" = "false" ]; then
            echo "Release $tag already published — nothing to publish."
            exit 0
          fi
          echo "Publishing $tag from manifest version $ver."
          # Release notes = this version's CHANGELOG section (validate-structure already
          # guarantees the entry exists); fall back to a pointer if extraction is empty.
          # POSIX literal-bracket class [[] / []] (not \[ \]) so this matches on both mawk and gawk.
          awk -v v="$ver" '
            $0 ~ "^## [[]" v "[]]" { grab=1; next }
            grab && /^## [[]/ { exit }
            grab { print }
          ' CHANGELOG.md > /tmp/relnotes.md
          [ -s /tmp/relnotes.md ] || echo "See CHANGELOG.md for $tag." > /tmp/relnotes.md
          # Only fall back to the bot identity when NOT signing — the import step set the maintainer
          # identity, which must match the GPG key's verified email for GitHub to show "Verified".
          if [ "${HAS_GPG:-}" != "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi
          if [ "$state" = "true" ]; then
            # A stray draft release exists for this tag — promote it instead of failing on create.
            echo "Existing draft found — promoting to published."
            gh release edit "$tag" --draft=false --notes-file /tmp/relnotes.md
            echo "Published $tag (promoted from draft)."
            exit 0
          fi
          # No release exists — create it. Idempotent annotated tag first; --verify-tag refuses to
          # mint a lightweight tag if the annotated one is somehow missing.
          if ! git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            # Sign when configured; fall back to an unsigned annotated tag if signing isn't set up or fails
            # (e.g. a passphrase-protected key), so a release can never be blocked on signing.
            if [ "${HAS_GPG:-}" = "true" ] && git tag -s "$tag" -m "udflow $tag"; then
              echo "Created SIGNED tag $tag."
            else
              if [ "${HAS_GPG:-}" = "true" ]; then
                echo "WARNING: tag signing unavailable (key/passphrase issue) — using an unsigned annotated tag."
              fi
              git tag -a "$tag" -m "udflow $tag"
            fi
            git push origin "$tag"
          fi
          gh release create "$tag" --title "$tag" --notes-file /tmp/relnotes.md --verify-tag
          echo "Published $tag."
