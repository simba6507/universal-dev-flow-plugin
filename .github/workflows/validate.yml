name: Validate

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]   # hooks have cross-platform path logic
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # full history + tags, for the version/tag consistency check
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      # Reliable, auth-free structural gate: manifests parse, required fields exist,
      # versions agree, references/agents/hooks linked from SKILL.md exist, every
      # agent/skill has frontmatter, and the shipped tree has no dev/runtime artifacts.
      - name: Validate plugin structure
        run: node .github/scripts/validate-structure.mjs

      # Version/tag drift guard — the 5th axis on top of the file-level agreement that
      # validate-structure.mjs enforces (plugin.json / marketplace / metadata /
      # package.json / CHANGELOG). Warn-only: a version bump is committed BEFORE its tag
      # is cut, so failing hard here would block every release commit.
      - name: Version/tag consistency (warn-only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ver=$(node -p "require('./udflow/.claude-plugin/plugin.json').version")
          if git rev-parse -q --verify "refs/tags/v$ver" >/dev/null; then
            echo "OK: git tag v$ver matches manifest version $ver."
          else
            echo "::warning::manifest version is $ver but no git tag v$ver exists yet — tag the release: git tag v$ver && git push origin v$ver"
          fi

      # The session hooks run on every session and fail open, so a syntax error
      # would otherwise be invisible. Syntax-check and behaviorally test them.
      - name: Syntax-check hooks
        shell: bash
        run: |
          node --check udflow/hooks/plan-gate.js
          node --check udflow/hooks/load-failure-memory.js
          node --check udflow/hooks/orchestration-check.js

      - name: Run hook tests
        shell: bash
        run: |
          test -f test/hooks.test.mjs   # guard: never let "0 tests found" pass as green
          node --test

      # Best-effort: the official validator. Linux-only and non-blocking because it
      # requires the Claude Code CLI, which may not run fully headless in CI.
      - name: claude plugin validate (best-effort)
        if: runner.os == 'Linux'
        continue-on-error: true
        shell: bash
        run: |
          npm install -g @anthropic-ai/claude-code || exit 0
          # Validate BOTH the marketplace (repo root) and the shipped plugin (./udflow).
          # The plugin manifest is in udflow/.claude-plugin/plugin.json, so validating
          # only the root would never check the plugin itself.
          claude plugin validate . || echo "marketplace validate could not run headless; the checks above are the gate."
          claude plugin validate ./udflow || echo "plugin validate could not run headless; the checks above are the gate."
